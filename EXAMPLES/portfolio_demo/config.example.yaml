# Portfolio Demo Configuration
# Copy this file to config.yaml and customize for your needs

# Security & Privacy (Safe-by-default)
LOCAL_ONLY: true
REDACT_PII: true
AUTO_EMAIL: false
RETENTION_DAYS: 30
CONSENT_REQUIRED: true

# LLM Configuration
LLM_PROVIDER: "openai"  # openai, hf, bedrock, vllm
DEFAULT_MODEL: "gpt-4o-mini"

# Embeddings
EMBEDDING_PROVIDER: "openai"  # openai, hf, local
EMBEDDING_MODEL: "text-embedding-3-small"
EMBEDDING_DIMENSION: 1536

# Vector Store
VECTOR_STORE: "faiss"  # faiss, pinecone, opensearch, pgvector

# RAG Pipeline
TOP_K_RETRIEVAL: 10
TOP_K_RERANK: 3
SIMILARITY_THRESHOLD: 0.7
INCLUDE_CITATIONS: true

# Document Processing
CHUNK_SIZE: 1000
CHUNK_OVERLAP: 200
MAX_FILE_SIZE_MB: 10

# Persona Configuration
PERSONA_PROMPT: |
  You are a professional portfolio assistant. Maintain a formal, concise tone.
  Cite sources when providing factual claims using [[source_id]] notation.
  Focus on technical skills, experience, and achievements.

# Memory & Persistence
REDIS_URL: "redis://localhost:6379/0"
MEMORY_TTL_HOURS: 24

# Logging
LOG_LEVEL: "INFO"
ENABLE_AUDIT_LOG: true
METRICS_ENABLED: false

# Fine-tuning (Optional)
FINE_TUNE_ENABLED: false
LORA_RANK: 16
LORA_ALPHA: 32
TRAINING_EPOCHS: 3
